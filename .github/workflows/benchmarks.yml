name: Benchmarks

on:
  push:
    branches: ["**"]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run benchmarks
        run: |
          {
            echo '## Benchmark Results'
            echo ''
            echo '```'
            go test -run=^$ -bench=. -benchmem -count=1 ./...
            echo '```'
          } | tee -a "$GITHUB_STEP_SUMMARY"
