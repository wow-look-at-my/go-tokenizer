name: Benchmarks

on:
  push:
    branches: ["**"]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run benchmarks
        run: go test -run=^$ -bench=. -benchmem -count=1 ./... | tee bench-raw.txt

      - name: Format results
        run: |
          {
            echo '## Benchmark Results'
            echo ''
            awk -f scripts/fmt-bench.awk bench-raw.txt
          } >> "$GITHUB_STEP_SUMMARY"
