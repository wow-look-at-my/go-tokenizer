name: Benchmarks

on:
  push:
    branches: ["**"]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: wow-look-at-my/go-toolchain@v1
        with:
          min-coverage: 0

      - name: Run benchmarks
        run: go test -run=^$ -bench=. -benchmem -count=1 ./... | tee bench-raw.txt

      - name: Format results
        run: |
          {
            echo '## Benchmark Results'
            echo ''
            awk -f scripts/fmt-bench.awk bench-raw.txt
            echo ''
            echo '## Chart'
            echo ''
            echo "![benchmarks](data:image/svg+xml;base64,$(go run ./scripts/benchviz < bench-raw.txt | base64 -w0))"
          } >> "$GITHUB_STEP_SUMMARY"
